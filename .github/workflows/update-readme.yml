name: Update README

on:
  schedule:
    - cron: "*/30 * * * *"   # runs every 30 minutes
  push:
    branches: [main]          # also runs on every push
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  update-readme:
    name: Update README with latest activity
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Fetch latest commit across all repos
        id: latest_commit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Fetch all public repos and their latest commit
          REPOS=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/users/ars-devsecops/repos?sort=pushed&per_page=10" \
            | jq -r '.[0] | "\(.name)|\(.pushed_at)|\(.description // "No description")"')

          REPO_NAME=$(echo "$REPOS" | cut -d'|' -f1)
          PUSHED_AT=$(echo "$REPOS" | cut -d'|' -f2)
          REPO_DESC=$(echo "$REPOS" | cut -d'|' -f3)

          # Get the actual last commit message of that repo
          LAST_COMMIT=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/ars-devsecops/${REPO_NAME}/commits?per_page=1" \
            | jq -r '.[0].commit.message' | head -1 | cut -c1-60)

          # Get commit SHA (short)
          COMMIT_SHA=$(curl -s -H "Authorization: token $GH_PAT" \
            "https://api.github.com/repos/ars-devsecops/${REPO_NAME}/commits?per_page=1" \
            | jq -r '.[0].sha' | cut -c1-7)

          # Format timestamp in IST (UTC+5:30)
          REFRESHED=$(TZ="Asia/Kolkata" date "+%d %b %Y · %I:%M %p IST")
          COMMIT_DATE=$(date -d "$PUSHED_AT" "+%d %b %Y" 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$PUSHED_AT" "+%d %b %Y" 2>/dev/null || echo "recently")

          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "refreshed=$REFRESHED" >> $GITHUB_OUTPUT

          echo "✅ Repo: $REPO_NAME"
          echo "✅ Commit: $LAST_COMMIT ($COMMIT_SHA)"
          echo "✅ Refreshed: $REFRESHED"

      - name: Update README dynamic section
        env:
          REPO_NAME:    ${{ steps.latest_commit.outputs.repo_name }}
          LAST_COMMIT:  ${{ steps.latest_commit.outputs.last_commit }}
          COMMIT_SHA:   ${{ steps.latest_commit.outputs.commit_sha }}
          COMMIT_DATE:  ${{ steps.latest_commit.outputs.commit_date }}
          REFRESHED:    ${{ steps.latest_commit.outputs.refreshed }}
        run: |
          # Replace everything between the dynamic markers in README.md
          python3 << 'PYEOF'
          import os, re

          repo      = os.environ["REPO_NAME"]
          commit    = os.environ["LAST_COMMIT"]
          sha       = os.environ["COMMIT_SHA"]
          date      = os.environ["COMMIT_DATE"]
          refreshed = os.environ["REFRESHED"]

          new_block = f"""<!-- DYNAMIC_STATS_START -->
          > ⏱️ **Last refreshed:** {refreshed}
          >
          > 🔀 **Latest commit:** `{sha}` — {commit}
          > 📁 **Repo:** [{repo}](https://github.com/ars-devsecops/{repo}) · {date}
          <!-- DYNAMIC_STATS_END -->"""

          # Clean up indentation
          new_block = "\n".join(line.lstrip() for line in new_block.splitlines())

          with open("README.md", "r") as f:
              content = f.read()

          # Replace between markers
          pattern = r"<!-- DYNAMIC_STATS_START -->.*?<!-- DYNAMIC_STATS_END -->"
          updated = re.sub(pattern, new_block, content, flags=re.DOTALL)

          with open("README.md", "w") as f:
              f.write(updated)

          print("✅ README updated successfully")
          PYEOF

      - name: Commit and push updated README
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"

          # Only commit if README actually changed
          if git diff --quiet README.md; then
            echo "No changes to README — skipping commit"
          else
            git add README.md
            git commit -m "chore: auto-update stats [skip ci]"
            git push
            echo "✅ README pushed successfully"
          fi
